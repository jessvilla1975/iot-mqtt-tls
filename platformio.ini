; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit SSD1306@^2.5.12
	sensirion/arduino-sht@^1.2.5
	bblanchon/ArduinoJson@^6.21.3
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:scripts/add_env_defines.py
src_filter = +<*> -<cam/**>

; ─────────────────────────────────────────────────────────────────────
; Entorno para el ESP32-S3-CAM-N16R8 (carrito con cámara OV2640)
; Board: ESP32-S3-CAM-N16R8  |  16 MB Flash QIO  |  8 MB PSRAM OPI
; Servos: 2x SG90 rotación continua (GPIO 14 izq, GPIO 21 der)
; ─────────────────────────────────────────────────────────────────────
[env:cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 16 MB Flash QIO + 8 MB PSRAM OPI (N16R8)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_cam.csv

build_flags =
	-DBOARD_HAS_PSRAM
	-DFIRMWARE_VERSION='"v1.0.0"'
	-DCORE_DEBUG_LEVEL=1

lib_deps =
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^6.21.3

; Solo compila los archivos compartidos + los de cam/
src_filter =
	-<*>
	+<libwifi.cpp>
	+<libota.cpp>
	+<libstorage.cpp>
	+<libprovision.cpp>
	+<cam/**>

extra_scripts = pre:scripts/add_env_defines.py
