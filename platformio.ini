; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32

;Para la S3 quita el simbolo ; de la siguiente línea y comenta la línea: board = esp32-s3-devkitc-1
;board = esp32dev
;Para la S3 quita el simbolo ; de la siguiente línea y comenta la línea: board = esp32dev
board = esp32-s3-devkitc-1

framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit SSD1306@^2.5.12
	sensirion/arduino-sht@^1.2.5
	bblanchon/ArduinoJson@^6.21.3
monitor_speed = 115200
upload_speed = 460800
; Las variables deben estar en el entorno antes de ejecutar pio
; Cargar con: set -a && source .env && set +a
; Luego platformio.ini las lee con ${sysenv.VARIABLE}
; ROOT_CA se maneja en add_env_defines.py por ser multilínea
; COUNTRY, STATE, CITY, MQTT_*, WIFI_* y MQTT_PORT se inyectan desde .env en scripts/add_env_defines.py
; (evita macros vacías cuando VS Code/PIO no exporta sysenv antes de leer platformio.ini)
extra_scripts = pre:scripts/add_env_defines.py

; Variables de entorno para configuración
; Crea .env a partir de .env.template o usa: python scripts/build_with_env.py
